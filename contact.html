<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - Loving Homes</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="img/logo.png" alt="Logo جديد"
                 style="height:4.5rem;vertical-align:middle;margin-left:18px;
                        box-shadow:0 2px 12px #888;background:#fff;
                        border-radius:12px;padding:4px;">
            <span style="font-size:2.7rem;font-weight:bold;
                         vertical-align:middle;">Loving Homes</span>
        </div>
        <div class="menu">
            <a href="index.html"> الرئيسية</a>
            <a href="about.html">عن الشركة</a>
            <a href="service.html">الخدمات</a>
            <a href="package.html">الحزم</a>
        </div>
        <div class="accessibility-toolbar">
            <button id="darkModeBtn" title="الوضع الليلي" class="btn">🌙</button>
            <button id="ttsBtn" title="تشغيل القارئ الآلي" class="btn">🔊</button>
            <button id="incFont" title="تكبير النص" class="btn">+</button>
            <button id="decFont" title="تصغير النص" class="btn">-</button>
        </div>
        <div class="contact">
            <a href="contact.html">تواصل معنا</a>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="form-card">
            <h1>تواصل معنا للاستفسار</h1>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">اسم المستخدم</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">رسالة للاستفسار عن الحزم أو الحزم المخصصة</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-button">إرسال</button>
            </form>
        </div>
    </div>

</body>
</html>
